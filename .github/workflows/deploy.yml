name: build-and-deploy

# Builds one Docker image, pushes it to GitHub Container Registry (GHCR), then
# pings Coolify to redeploy. The deploy step is skipped automatically unless the
# COOLIFY_WEBHOOK secret is set, so this is safe before Coolify is wired up.

on:
  push:
    branches:
      - main
      - claude/quirky-mccarthy-1n79ud
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Only auto-deploy from the repository's default branch.
    if: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    env:
      COOLIFY_WEBHOOK: ${{ secrets.COOLIFY_WEBHOOK }}
      COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
    steps:
      - name: Trigger Coolify deployment
        if: ${{ env.COOLIFY_WEBHOOK != '' }}
        run: |
          echo "Triggering Coolify redeploy..."
          curl -fsSL --retry 3 -X GET "$COOLIFY_WEBHOOK" \
            -H "Authorization: Bearer $COOLIFY_TOKEN"
          echo "Done."

      - name: Coolify not configured
        if: ${{ env.COOLIFY_WEBHOOK == '' }}
        run: echo "COOLIFY_WEBHOOK secret not set — skipping deploy. Image is pushed to GHCR."
